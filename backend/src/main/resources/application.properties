spring.application.name=gestion-pagos-viajes

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

jwt.access.secret=${JWT_ACCESS_SECRET}
jwt.access.expiration=1800000
jwt.refresh.bytes=20
jwt.refresh.expiration=2592000000

# --- Mail (Gmail / Google Workspace SMTP) ---
# Use an App Password (recommended) and keep secrets in env vars.
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_APP_PASSWORD:${SMTP_KEY:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Contact form destination / sender (agency mailbox)
app.mail.to=consultas@proyectova.com.ar
app.mail.from=${SMTP_FROM:${SMTP_USERNAME:consultas@proyectova.com.ar}}

# Installment reminder notifications
app.notifications.installments.enabled=${INSTALLMENT_NOTIFICATIONS_ENABLED:true}
app.notifications.installments.cron=${INSTALLMENT_NOTIFICATIONS_CRON:0 0 9 * * *}
app.notifications.installments.zone=${INSTALLMENT_NOTIFICATIONS_ZONE:America/Argentina/Buenos_Aires}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
app.frontend.url=${FRONTEND_URL:http://localhost:30005}
