services:
  db:
    image: "postgres:17.4"
    restart: "on-failure:3"
    environment:
      POSTGRES_DB: "${DB_NAME}"
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - "${VOLUME_DIR}/data/postgres:/var/lib/postgresql/data"
    ports:
      - "127.0.0.1:${DB_EXTERNAL_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: "./backend"
    env_file:
      - ".env"
    depends_on:
      db:
        condition: service_healthy
    restart: "on-failure:3"
    volumes:
      - "receipts-data:/home/app/data/receipts"
    environment:
      SPRING_DATASOURCE_USERNAME: "${DB_USERNAME}"
      SPRING_DATASOURCE_PASSWORD: "${DB_PASSWORD}"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/${DB_NAME}"
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET}"
      DEFAULT_ADMIN_EMAIL: "${DEFAULT_ADMIN_EMAIL}"
      DEFAULT_ADMIN_PASSWORD: "${DEFAULT_ADMIN_PASSWORD}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      SMTP_APP_PASSWORD: "${SMTP_APP_PASSWORD:-}"
      QUERY_MAIL: "${QUERY_MAIL}"
      APP_MAIL_TO: "${APP_MAIL_TO}"
      BREVO_API_KEY: "${BREVO_API_KEY}"
      BREVO_FROM_EMAIL: "${BREVO_FROM_EMAIL}"
      BREVO_FROM_NAME: "${BREVO_FROM_NAME}"
      BREVO_REPLY_TO: "${BREVO_REPLY_TO}"
      FRONTEND_URL: "${FRONTEND_URL}"
      INSTALLMENT_NOTIFICATIONS_ENABLED: "${INSTALLMENT_NOTIFICATIONS_ENABLED}"
      INSTALLMENT_NOTIFICATIONS_CRON: "${INSTALLMENT_NOTIFICATIONS_CRON}"
      INSTALLMENT_NOTIFICATIONS_ZONE: "${INSTALLMENT_NOTIFICATIONS_ZONE}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS}"
      SPRING_PROFILES_ACTIVE: local
    ports:
      - "${BACKEND_EXTERNAL_PORT}:8080"

  frontend:
    build: "./frontend"
    depends_on:
      - "backend"
    restart: "on-failure:3"
    environment:
      BACKEND_EXTERNAL_URL: "${BACKEND_EXTERNAL_URL}"
    ports:
      - "${FRONTEND_EXTERNAL_PORT}:80"

  adminer:
    image: "adminer:5.0.4"
    depends_on:
      - "db"
    restart: "on-failure:3"
    ports:
      - "127.0.0.1:${ADMINER_EXTERNAL_PORT}:8080"

volumes:
  receipts-data:
