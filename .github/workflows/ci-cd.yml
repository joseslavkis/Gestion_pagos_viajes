name: CI/CD

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Tests del backend
  # Corre en todo PR a main o dev, y en push a main
  # ─────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Correr tests
        working-directory: backend
        run: ./mvnw test

      - name: Publicar resultados de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/target/surefire-reports/

  # ─────────────────────────────────────────
  # JOB 2: Build del frontend
  # Verifica que el frontend compila sin errores
  # ─────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # ─────────────────────────────────────────
  # JOB 3: Deploy a Railway
  # Solo corre cuando hay push a main Y los tests pasaron
  # ─────────────────────────────────────────
  deploy:
    name: Deploy a Railway
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy a Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.RAILWAY_SERVICE }}
